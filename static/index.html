<!DOCTYPE html>
<html>
<head>
    <title>Evidence Intelligence System</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
    body {
        background: #111111;
        color: #e5e5e5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        height: 100vh;
        overflow: hidden;
    }

    .sidebar {
        background: #1a1a1a;
        border-right: 1px solid #2a2a2a;
        height: 100vh;
        padding: 20px;
    }

    .sidebar h4 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 25px;
        color: #ffffff;
    }

    .sidebar input {
        background: #222222;
        border: 1px solid #2e2e2e;
        color: #e5e5e5;
    }

    .sidebar input::placeholder {
        color: #888;
    }

    .sidebar button {
        width: 100%;
        margin-bottom: 15px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #e5e5e5;
    }

    .sidebar button:hover {
        background: #333333;
    }

    .chat-container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #111111;
    }

    .chat-header {
        padding: 15px 20px;
        border-bottom: 1px solid #2a2a2a;
        font-weight: 500;
        font-size: 16px;
        background: #151515;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 25px;
        display: flex;
        flex-direction: column;
    }

    .chat-bubble {
        padding: 12px 16px;
        margin-bottom: 15px;
        border-radius: 10px;
        max-width: 65%;
        font-size: 14px;
        line-height: 1.5;
        word-wrap: break-word;
    }

    .user {
        background: #2a2a2a;
        align-self: flex-end;
        border: 1px solid #3a3a3a;
    }

    .ai {
        background: #1a1a1a;
        border: 1px solid #2e2e2e;
        align-self: flex-start;
    }

    .chat-input {
        padding: 15px 20px;
        border-top: 1px solid #2a2a2a;
        background: #151515;
        display: flex;
    }

    .chat-input input {
        flex: 1;
        background: #222222;
        border: 1px solid #2e2e2e;
        color: #e5e5e5;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 14px;
    }

    .chat-input input::placeholder {
        color: #888;
    }

    .chat-input button {
        margin-left: 10px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #e5e5e5;
        padding: 8px 16px;
    }

    .chat-input button:hover {
        background: #333333;
    }

    .typing {
        font-style: italic;
        color: #888;
        font-size: 13px;
    }

</style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 sidebar">
            <h4>Evidence Tools</h4>

            <input type="file" id="fileInput" class="form-control mb-2">
            <button class="btn btn-primary" onclick="uploadFile()">Upload Evidence</button>

            <input type="text" id="searchQuery" class="form-control mb-2" placeholder="Semantic search">
            <button class="btn btn-success" onclick="semanticSearch()">Search</button>

            <input type="text" id="deleteId" class="form-control mb-2" placeholder="Delete Document ID">
            <button class="btn btn-danger" onclick="deleteEmbedding()">Delete</button>
        </div>

        <!-- Chat Section -->
        <div class="col-md-9 chat-container">

            <div class="chat-header">
                Investigation Assistant AI
            </div>

            <div id="chatMessages" class="chat-messages d-flex flex-column">
            </div>

            <div class="chat-input">
                <input type="text" id="llmQuery" placeholder="Ask about evidence...">
                <button class="btn btn-info" onclick="askLLM()">Send</button>
            </div>

        </div>
    </div>
</div>

<script>

function addMessage(text, type) {
    let chat = document.getElementById("chatMessages");
    let bubble = document.createElement("div");
    bubble.className = `chat-bubble ${type}`;
    bubble.innerText = text;
    chat.appendChild(bubble);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    addMessage("Analyzing evidence...", "ai typing");
}

async function uploadFile() {
    let fileInput = document.getElementById("fileInput");
    let formData = new FormData();
    formData.append("file", fileInput.files[0]);

    showTyping();

    let response = await fetch("/upload-evidence", {
        method: "POST",
        body: formData
    });

    let result = await response.json();
    addMessage("Evidence Uploaded Successfully ✅", "ai");
}

async function semanticSearch() {
    let query = document.getElementById("searchQuery").value;

    addMessage(query, "user");
    showTyping();

    let response = await fetch(`/semantic-search?query=${query}`, {
        method: "POST"
    });

    let result = await response.json();
    addMessage(JSON.stringify(result, null, 2), "ai");
}

async function askLLM() {
    let query = document.getElementById("llmQuery").value;

    addMessage(query, "user");
    document.getElementById("llmQuery").value = "";

    showTyping();

    let response = await fetch(`/ask?query=${query}`, {
        method: "POST"
    });

    let result = await response.json();
    addMessage(result.answer || result.error, "ai");
}

async function deleteEmbedding() {
    let id = document.getElementById("deleteId").value;

    showTyping();

    let response = await fetch(`/delete-embedding/${id}`, {
        method: "DELETE"
    });

    let result = await response.json();
    addMessage(result.message, "ai");
}

</script>

</body>
</html>
